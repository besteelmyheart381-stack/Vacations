<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Vacations">
<meta name="theme-color" content="#0A4F8F">
<meta name="description" content="Warren Family Travel Planner">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Vacation Planner</title>
<style>
:root {
  --primary: #0A4F8F;
  --primary-dark: #073a6b;
  --primary-light: #1a7abf;
  --accent: #F4A637;
  --accent-dark: #d4891e;
  --success: #27ae60;
  --danger: #e74c3c;
  --warning: #f39c12;
  --bg: #EEF4FB;
  --card: #ffffff;
  --text: #1a2a3a;
  --text-muted: #6b7f94;
  --border: #dde8f2;
  --header-h: 56px;
  --safe-top: env(safe-area-inset-top, 44px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --tab-h: 60px;
  --radius: 14px;
  --radius-sm: 8px;
  --shadow: 0 2px 12px rgba(10,79,143,0.10);
  --shadow-lg: 0 8px 32px rgba(10,79,143,0.16);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { height: 100%; background: #0A4F8F; }
body { height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif; background: #0A4F8F; }

#app {
  position: fixed; inset: 0;
  max-width: 430px; margin: 0 auto;
  background: var(--bg);
  overflow: hidden;
  display: flex; flex-direction: column;
}

/* ===== SCREENS ===== */
.screen {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  background: var(--bg);
  transform: translateX(100%);
  transition: transform 0.32s cubic-bezier(0.4,0,0.2,1);
  will-change: transform;
  overflow: hidden;
}
.screen.active { transform: translateX(0); }
.screen.behind { transform: translateX(-28%); }

/* ===== HEADER ===== */
.header {
  flex-shrink: 0;
  padding-top: var(--safe-top);
  background: var(--primary);
  color: #fff;
  z-index: 10;
}
.header-inner {
  height: var(--header-h);
  display: flex; align-items: center;
  padding: 0 14px; gap: 8px;
}
.header-title { font-size: 17px; font-weight: 700; flex: 1; letter-spacing: -0.3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.header-subtitle { font-size: 11px; opacity: 0.72; margin-top: 1px; }
.header-title-group { flex: 1; min-width: 0; }

.btn-icon {
  width: 36px; height: 36px; border-radius: 50%;
  border: none; background: rgba(255,255,255,0.15);
  color: #fff; display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0; font-size: 16px;
  -webkit-appearance: none;
}
.btn-icon:active { background: rgba(255,255,255,0.28); }
.btn-icon.dark {
  background: rgba(10,79,143,0.08);
  color: var(--primary);
}
.btn-icon.dark:active { background: rgba(10,79,143,0.16); }

/* ===== MENU STACK ===== */
.menu-close-overlay {
  position: fixed; inset: 0; z-index: 190; display: none;
}
.menu-close-overlay.open { display: block; background: rgba(0,0,0,0.32); }

.menu-popover {
  position: absolute;
  top: calc(var(--safe-top) + var(--header-h) + 6px);
  right: 12px;
  background: #fff;
  border-radius: 16px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.24), 0 2px 8px rgba(0,0,0,0.10);
  z-index: 200;
  min-width: 210px;
  overflow: hidden;
  border: 1px solid rgba(0,0,0,0.06);
  display: none;
  transform-origin: top right;
  animation: menuPop 0.18s cubic-bezier(0.34,1.56,0.64,1) forwards;
}
.menu-popover.open { display: block; }
@keyframes menuPop {
  from { opacity: 0; transform: scale(0.88); }
  to   { opacity: 1; transform: scale(1); }
}
.menu-popover-item {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 18px;
  font-size: 15px; font-weight: 600; color: var(--text);
  cursor: pointer; border-bottom: 1px solid var(--border);
}
.menu-popover-item:last-child { border-bottom: none; }
.menu-popover-item:active { background: var(--bg); }
.menu-popover-item.current { color: var(--primary); }
.menu-popover-item.danger { color: var(--danger); }
.menu-icon { width: 26px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; color: var(--primary); }
.menu-icon svg { width: 18px; height: 18px; }

/* ===== SCROLL CONTENT ===== */
.scroll-content {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding-bottom: calc(var(--tab-h) + var(--safe-bottom) + 16px);
}
.scroll-content.no-tab { padding-bottom: calc(var(--safe-bottom) + 16px); }

/* ===== BOTTOM TAB BAR ===== */
.tab-bar {
  flex-shrink: 0;
  height: calc(var(--tab-h) + var(--safe-bottom));
  padding-bottom: var(--safe-bottom);
  background: var(--card);
  border-top: 1px solid var(--border);
  display: flex; align-items: stretch;
  z-index: 20;
}
.tab-item {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 3px; cursor: pointer;
  border: none; background: none; color: var(--text-muted);
  font-size: 10px; font-weight: 500; padding: 6px 0;
  -webkit-appearance: none;
}
.tab-item.active { color: var(--primary); }
.tab-item svg { width: 24px; height: 24px; }
.btn-icon svg { width: 20px; height: 20px; }

/* ===== INNER TRIP TABS ===== */
.trip-tabs {
  display: flex; background: var(--primary);
  border-top: 1px solid rgba(255,255,255,0.12);
}
.trip-tab {
  flex: 1; padding: 10px 4px; font-size: 11px; font-weight: 600;
  color: rgba(255,255,255,0.55); border: none; background: none;
  border-bottom: 2px solid transparent; cursor: pointer;
  letter-spacing: 0.3px; text-transform: uppercase;
  -webkit-appearance: none;
}
.trip-tab.active { color: #fff; border-bottom-color: var(--accent); }

/* ===== CARDS ===== */
.card {
  background: var(--card); border-radius: var(--radius);
  box-shadow: var(--shadow); margin: 12px 16px 0;
  overflow: hidden;
}
.card-header {
  padding: 14px 16px 10px;
  display: flex; align-items: center; gap: 10px;
}
.card-title { font-size: 15px; font-weight: 700; color: var(--text); flex: 1; }
.card-body { padding: 0 16px 14px; }

/* ===== TRIP CARD ===== */
.trip-card {
  background: var(--card); border-radius: var(--radius);
  box-shadow: var(--shadow); margin: 8px 16px 0;
  overflow: hidden; cursor: pointer; position: relative;
  display: flex; align-items: center; gap: 13px;
  padding: 13px 14px;
  border-left: 4px solid var(--tc-main, var(--primary));
  transition: transform 0.1s, opacity 0.1s;
}
.trip-card:active { opacity: 0.92; transform: scale(0.99); }
.trip-card-suitcase {
  width: 52px; height: 52px; border-radius: 13px;
  background: var(--tc-bg, #E3EEFA);
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; flex-shrink: 0;
}
.trip-card-content { flex: 1; min-width: 0; }
.trip-card-name {
  font-size: 15px; font-weight: 800; color: var(--text);
  letter-spacing: -0.2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.trip-card-dest {
  font-size: 12px; color: var(--text-muted); margin-top: 2px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.trip-card-row {
  display: flex; align-items: center; gap: 7px; margin-top: 6px; flex-wrap: wrap;
}
.trip-card-dates {
  font-size: 12px; color: var(--tc-main, var(--primary)); font-weight: 700;
}
.trip-card-edit-btn {
  margin-top: 8px; margin-left: auto;
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 12px; font-weight: 700; letter-spacing: 0.1px;
  color: var(--tc-main, var(--primary));
  background: var(--tc-bg, #E3EEFA);
  border: none; border-radius: 20px;
  padding: 4px 10px; cursor: pointer; -webkit-appearance: none;
}
.trip-card-edit-btn svg { width: 12px; height: 12px; }

/* Badge */
.badge {
  padding: 3px 8px; border-radius: 20px; font-size: 10px; font-weight: 700;
  letter-spacing: 0.2px;
}
.badge-blue { background: #E3EEFA; color: var(--primary); }
.badge-green { background: #E6F9EE; color: var(--success); }
.badge-orange { background: #FFF3E0; color: var(--accent-dark); }
.badge-red { background: #FEE8E6; color: var(--danger); }
.badge-gray { background: #F0F4F8; color: var(--text-muted); }

/* ===== SECTION HEADERS ===== */
.section-header {
  padding: 16px 16px 6px;
  font-size: 12px; font-weight: 700; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 0.8px;
}

/* ===== DAY ROW ===== */
.day-row {
  background: var(--card); border-bottom: 1px solid var(--border);
  padding: 13px 16px; cursor: pointer; display: flex; align-items: center; gap: 12px;
}
.day-row:active { background: #F6FAFF; }
.day-dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--primary-light); flex-shrink: 0;
}
.day-row-info { flex: 1; }
.day-row-label { font-size: 14px; font-weight: 700; color: var(--text); }
.day-row-date { font-size: 12px; color: var(--text-muted); margin-top: 1px; }
.day-row-location { font-size: 13px; color: var(--primary); margin-top: 2px; font-weight: 500; display:flex;align-items:center;gap:3px; }
.day-row-chips { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 6px; }
.chevron { color: var(--border); font-size: 18px; }

/* ===== MEAL CARD ===== */
.meal-section { border-bottom: 1px solid var(--border); }
.meal-section:last-child { border-bottom: none; }
.meal-row {
  display: flex; align-items: center; gap: 12px;
  padding: 13px 16px; cursor: pointer;
}
.meal-row:active { background: #F6FAFF; }
.meal-icon {
  width: 36px; height: 36px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center; font-size: 20px;
  flex-shrink: 0;
}
.meal-info { flex: 1; }
.meal-label { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.4px; }
.meal-restaurant { font-size: 14px; color: var(--text); margin-top: 1px; }
.meal-meta { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

/* ===== ACTIVITY CARD ===== */
.activity-item {
  padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; gap: 12px; align-items: flex-start;
}
.activity-item:last-child { border-bottom: none; }
.activity-icon {
  width: 36px; height: 36px; border-radius: 10px; background: #E3EEFA;
  display: flex; align-items: center; justify-content: center; font-size: 18px;
  flex-shrink: 0; margin-top: 1px;
}
.activity-info { flex: 1; }
.activity-name { font-size: 14px; font-weight: 700; color: var(--text); }
.activity-time { font-size: 12px; color: var(--primary); font-weight: 600; margin-top: 2px; }
.activity-location { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
.activity-booking { font-size: 12px; color: var(--success); margin-top: 2px; font-weight: 600; }
.activity-actions { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }

/* ===== CLOTHES TAB ===== */
.person-tabs { display: flex; background: var(--card); border-bottom: 1px solid var(--border); }
.person-tab {
  flex: 1; padding: 10px 4px; font-size: 13px; font-weight: 600;
  color: var(--text-muted); border: none; background: none;
  border-bottom: 2px solid transparent; cursor: pointer;
  -webkit-appearance: none;
}
.person-tab.active { color: var(--primary); border-bottom-color: var(--primary); }

.clothes-day-picker-wrap {
  background: var(--card); border-bottom: 1px solid var(--border);
  position: relative;
}
.clothes-day-picker {
  display: flex; overflow-x: auto; gap: 8px;
  padding: 10px 16px 6px;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: thin;
  scrollbar-color: var(--primary) var(--border);
  padding-bottom: 8px;
}
.clothes-day-picker::-webkit-scrollbar { height: 4px; }
.clothes-day-picker::-webkit-scrollbar-track { background: var(--border); border-radius: 2px; margin: 0 16px; }
.clothes-day-picker::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 2px; }
.clothes-day-picker-wrap::after {
  content: ''; position: absolute; top: 0; right: 0; bottom: 0; width: 28px;
  background: linear-gradient(to left, var(--card), transparent);
  pointer-events: none;
}

.day-chip {
  flex-shrink: 0; padding: 7px 12px; border-radius: 20px;
  background: var(--bg); color: var(--text-muted);
  font-size: 11px; font-weight: 600; cursor: pointer; border: 1.5px solid var(--border);
  white-space: nowrap; text-align: center; line-height: 1.4;
}
.day-chip.active { background: var(--primary); color: #fff; border-color: var(--primary); }

.clothes-field {
  background: var(--card); border-radius: var(--radius);
  box-shadow: var(--shadow); margin: 12px 16px 0; overflow: hidden;
}
.clothes-field-label {
  padding: 10px 14px 0; font-size: 11px; font-weight: 700;
  color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.6px;
}
.clothes-field textarea {
  width: 100%; border: none; outline: none; resize: none;
  font-family: inherit; font-size: 14px; color: var(--text);
  padding: 8px 14px 12px; background: transparent; min-height: 64px;
}

/* ===== PACKING LIST ===== */
.packing-filter { display: flex; overflow-x: auto; gap: 8px; padding: 12px 16px; scrollbar-width: none; }
.packing-filter::-webkit-scrollbar { display: none; }
.filter-chip {
  flex-shrink: 0; padding: 6px 14px; border-radius: 20px;
  font-size: 13px; font-weight: 600; cursor: pointer;
  border: 1.5px solid var(--border); background: var(--bg); color: var(--text-muted);
  -webkit-appearance: none;
}
.filter-chip.active { background: var(--primary); color: #fff; border-color: var(--primary); }

.packing-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 16px; border-bottom: 1px solid var(--border);
  background: var(--card); cursor: pointer;
}
.packing-item:active { background: #F6FAFF; }
.packing-item.packed { opacity: 0.5; }
.packing-check {
  width: 24px; height: 24px; border-radius: 50%;
  border: 2px solid var(--border); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 14px;
}
.packing-check.checked { background: var(--success); border-color: var(--success); }
.packing-item-name { flex: 1; font-size: 14px; color: var(--text); }
.packing-item-person { font-size: 11px; font-weight: 700; color: var(--text-muted); }
.packing-progress {
  background: var(--card); margin: 12px 16px 0;
  border-radius: var(--radius); box-shadow: var(--shadow); padding: 14px 16px;
}
.progress-bar-bg { height: 8px; background: var(--border); border-radius: 4px; margin-top: 8px; overflow: hidden; }
.progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--primary-light)); border-radius: 4px; transition: width 0.3s; }

/* ===== INFO TAB ===== */
.info-row { display: flex; flex-direction: column; gap: 2px; padding: 12px 16px; border-bottom: 1px solid var(--border); }
.info-row:last-child { border-bottom: none; }
.info-label { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
.info-value { font-size: 14px; color: var(--text); }
.info-value a { color: var(--primary); text-decoration: none; }

/* ===== ARCHIVE ===== */
.archive-item {
  display: flex; align-items: center; gap: 12px;
  padding: 13px 16px; border-bottom: 1px solid var(--border);
  cursor: pointer; background: var(--card);
}
.archive-item:last-child { border-bottom: none; }
.archive-item:active { background: #F6FAFF; }
.archive-year-badge {
  width: 44px; height: 44px; border-radius: 10px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 11px; font-weight: 800; flex-shrink: 0;
  text-align: center; line-height: 1.2;
}
.archive-dest { flex: 1; font-size: 14px; color: var(--text); font-weight: 500; }

/* ===== MODALS ===== */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.5);
  z-index: 100; display: none; align-items: flex-end; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal-sheet {
  background: var(--card); border-radius: 20px 20px 0 0;
  width: 100%; max-width: 430px;
  max-height: 92vh; display: flex; flex-direction: column;
  padding-bottom: var(--safe-bottom);
}
.modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 12px auto 0; }
.modal-header { display: flex; align-items: center; gap: 10px; padding: 14px 16px; border-bottom: 1px solid var(--border); }
.modal-title { font-size: 17px; font-weight: 700; color: var(--text); flex: 1; }
.modal-body { overflow-y: auto; -webkit-overflow-scrolling: touch; flex: 1; }

/* ===== FORMS ===== */
.form-group { padding: 14px 16px; border-bottom: 1px solid var(--border); }
.form-section-label {
  padding: 14px 16px 4px; font-size: 13px; font-weight: 800; color: var(--primary);
  text-transform: uppercase; letter-spacing: 0.6px; background: var(--bg);
  border-bottom: 1px solid var(--border);
}
.form-label { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; display: block; }
.form-row { display: flex; gap: 10px; }
.form-row .form-input { flex: 1; }
.form-input {
  width: 100%; border: 1.5px solid var(--border); border-radius: var(--radius-sm);
  padding: 10px 12px; font-family: inherit; font-size: 14px; color: var(--text);
  background: var(--bg); outline: none; -webkit-appearance: none;
}
.form-input:focus { border-color: var(--primary); background: #fff; }
.form-textarea {
  width: 100%; border: 1.5px solid var(--border); border-radius: var(--radius-sm);
  padding: 10px 12px; font-family: inherit; font-size: 14px; color: var(--text);
  background: var(--bg); outline: none; resize: none; min-height: 80px; -webkit-appearance: none;
}
.form-textarea:focus { border-color: var(--primary); background: #fff; }
.form-select {
  width: 100%; border: 1.5px solid var(--border); border-radius: var(--radius-sm);
  padding: 10px 12px; font-family: inherit; font-size: 14px; color: var(--text);
  background: var(--bg); outline: none; -webkit-appearance: none;
}
.form-select:focus { border-color: var(--primary); }

/* ===== BUTTONS ===== */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 12px 20px; border-radius: 12px; font-family: inherit;
  font-size: 15px; font-weight: 700; border: none; cursor: pointer;
  -webkit-appearance: none; letter-spacing: -0.2px;
}
.btn:active { opacity: 0.85; transform: scale(0.98); }
.btn-primary { background: var(--primary); color: #fff; }
.btn-accent { background: var(--accent); color: #fff; }
.btn-danger { background: var(--danger); color: #fff; }
.btn-ghost { background: transparent; color: var(--primary); }
.btn-outline { background: transparent; color: var(--primary); border: 1.5px solid var(--primary); }
.btn-full { width: 100%; }
.btn-sm { padding: 7px 14px; font-size: 13px; border-radius: 8px; }
.btn-row { display: flex; gap: 10px; padding: 14px 16px; }
.btn-row .btn { flex: 1; }

/* ===== EMPTY STATE ===== */
.empty-state { display: flex; flex-direction: column; align-items: center; padding: 60px 32px; text-align: center; gap: 12px; }
.empty-icon { font-size: 56px; }
.empty-title { font-size: 18px; font-weight: 700; color: var(--text); }
.empty-sub { font-size: 14px; color: var(--text-muted); line-height: 1.5; }

/* ===== HOME HERO ===== */
.home-hero {
  background: linear-gradient(160deg, var(--primary-dark), var(--primary-light));
  padding-top: var(--safe-top);
  color: #fff; flex-shrink: 0;
}
.home-hero-inner {
  display: flex; align-items: center; gap: 10px;
  padding: 16px 14px 20px;
}
.home-hero-title { font-size: 26px; font-weight: 900; letter-spacing: -0.5px; }
.home-hero-sub { font-size: 13px; opacity: 0.75; margin-top: 3px; }
.home-hero-text { flex: 1; }

/* ===== COUNTDOWN ===== */
.countdown-card {
  background: linear-gradient(135deg, var(--accent-dark), var(--accent));
  border-radius: var(--radius); margin: 12px 16px 0;
  padding: 14px 16px; color: #fff; box-shadow: var(--shadow-lg);
}
.countdown-label { font-size: 11px; font-weight: 700; opacity: 0.8; text-transform: uppercase; letter-spacing: 0.6px; }
.countdown-number { font-size: 44px; font-weight: 900; letter-spacing: -2px; line-height: 1; }
.countdown-unit { font-size: 13px; opacity: 0.8; margin-top: 2px; }
.countdown-trip { font-size: 14px; font-weight: 700; margin-top: 6px; }

/* ===== TOGGLE ===== */
.toggle {
  width: 44px; height: 26px; border-radius: 13px;
  background: var(--border); position: relative; cursor: pointer;
  transition: background 0.2s; flex-shrink: 0;
}
.toggle.on { background: var(--success); }
.toggle::after {
  content: ''; position: absolute; top: 3px; left: 3px;
  width: 20px; height: 20px; border-radius: 50%; background: #fff;
  box-shadow: 0 1px 4px rgba(0,0,0,0.2); transition: transform 0.2s;
}
.toggle.on::after { transform: translateX(18px); }

/* ===== MISC ===== */
.divider { height: 1px; background: var(--border); margin: 0 16px; }
.spacer { height: 16px; }
#toast {
  position: fixed; top: calc(var(--safe-top) + 60px); left: 50%;
  transform: translateX(-50%) translateY(-20px);
  background: #1a2a3a; color: #fff; border-radius: 20px;
  padding: 10px 20px; font-size: 14px; font-weight: 600;
  z-index: 999; opacity: 0; transition: all 0.25s; pointer-events: none; white-space: nowrap;
}

@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.fade-in { animation: fadeIn 0.25s ease forwards; }

/* ===== INSTALL BANNER ===== */

let S = {
  data:null, screen:'home', stack:[], tripId:null, tripTab:0,
  dayId:null, clothesPerson:0, clothesDayIdx:0, packFilter:'All',
  homeTab:0, modal:null, modalData:{}, menuOpen:false
};

function save() { localStorage.setItem(DB_KEY, JSON.stringify(S.data)); }

function load() {
  try {
    const raw = localStorage.getItem(DB_KEY);
    if (raw) {
      const d = JSON.parse(raw);
      if (d.version >= 3) {
        d.trips.forEach(t => {
          if (!t.departFlight) t.departFlight = { date:'', time:'', airline:'', flightNumber:'' };
          if (!t.returnFlight) t.returnFlight = { date:'', time:'', airline:'', flightNumber:'' };
          if (!t.travelers || !t.travelers.length) t.travelers = [...d.travelers];
        });
        d.version = 4;
        return d;
      }
    }
  } catch(e) {}
  return buildDefaultData();
}

function trip() { return S.data.trips.find(t => t.id === S.tripId); }
function day()  { const t = trip(); return t ? t.days.find(d => d.id === S.dayId) : null; }

function navigate(screen, params={}) {
  S.menuOpen = false;
  S.stack.push({ screen:S.screen, tripId:S.tripId, tripTab:S.tripTab, dayId:S.dayId,
    clothesPerson:S.clothesPerson, clothesDayIdx:S.clothesDayIdx, packFilter:S.packFilter, homeTab:S.homeTab });
  Object.assign(S, { screen }, params);
  render();
}

function back() {
  if (S.modal) { closeModal(); return; }
  S.menuOpen = false;
  if (S.stack.length) { const prev = S.stack.pop(); Object.assign(S, prev); render(); }
}

function openModal(name, data={}) {
  S.modal = name; S.modalData = data; S.menuOpen = false;
  const el = document.getElementById('modal-'+name);
  if (el) { renderModal(name); el.classList.add('open'); attachEvents(); }
}

function closeModal() {
  if (S.modal) {
    const el = document.getElementById('modal-'+S.modal);
    if (el) el.classList.remove('open');
    S.modal = null; S.modalData = {};
    render();
  }
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

// ============================================================
// MENU
// ============================================================
function buildMenuHtml() {
  const onTrip = (S.screen === 'trip' || S.screen === 'day');
  const onHome = (S.screen === 'home' || S.screen === 'archive');
  let items = '';
  items += `<div class="menu-popover-item ${onHome?'current':''}" data-action="menu-dashboard">
    <span class="menu-icon">${icons.home}</span> Dashboard</div>`;
  if (onTrip) {
    items += `<div class="menu-popover-item" data-action="menu-edit">
      <span class="menu-icon">${icons.edit}</span> Edit Trip</div>`;
  }
  items += `<div class="menu-popover-item" data-action="menu-save">
    <span class="menu-icon">${icons.save}</span> Save</div>`;
  items += `<div class="menu-popover-item" data-action="menu-new-trip">
    <span class="menu-icon">${icons.plus}</span> New Trip</div>`;
  items += `<div class="menu-popover-item" data-action="menu-export">
    <span class="menu-icon">${icons.export}</span> Export Data</div>`;
  items += `<div class="menu-popover-item" data-action="menu-import">
    <span class="menu-icon">${icons.import}</span> Import Data</div>`;
  return items;
}

// ============================================================
// RENDER ENGINE
// ============================================================
function render() {
  const app = document.getElementById('app');
  const screens = {
    'home': renderHome, 'trip': renderTrip, 'day': renderDay,
    'archive': renderArchive, 'new-trip': renderNewTrip, 'edit-trip': renderEditTrip
  };

  let html = '';
  Object.keys(screens).forEach(key => {
    const isActive = S.screen === key;
    const isBehind = S.stack.length && S.stack[S.stack.length-1].screen === key && !isActive;
    const cls = isActive ? 'screen active' : (isBehind ? 'screen behind' : 'screen');
    html += `<div id="scr-${key}" class="${cls}">${(isActive||isBehind) ? screens[key]() : ''}</div>`;
  });

  html += renderModals();
  html += `<div class="menu-close-overlay ${S.menuOpen?'open':''}" data-action="close-menu"></div>`;
  html += `<div class="menu-popover ${S.menuOpen?'open':''}">${buildMenuHtml()}</div>`;

  app.innerHTML = html;
  attachEvents();
}

// ============================================================
// HOME SCREEN
// ============================================================
function renderHome() {
  const upcoming = S.data.trips.filter(t => t.status === 'upcoming').sort((a,b) => a.startDate.localeCompare(b.startDate));
  let nextTrip = null; let minDays = Infinity;
  upcoming.forEach(t => { const d = daysUntil(t.startDate); if (d >= 0 && d < minDays) { minDays = d; nextTrip = t; } });

  let countdownHtml = '';
  if (nextTrip) {
    countdownHtml = `<div class="countdown-card fade-in">
      <div class="countdown-label">Next Adventure in</div>
      <div class="countdown-number">${minDays}</div>
      <div class="countdown-unit">day${minDays!==1?'s':''}</div>
      <div class="countdown-trip">${nextTrip.name}</div>
    </div>`;
  }

  let tripsHtml = '';
  if (upcoming.length === 0) {
    tripsHtml = `<div class="empty-state"><div class="empty-icon">🗺️</div><div class="empty-title">No upcoming trips</div><div class="empty-sub">Tap New Trip in the menu to plan your next adventure.</div></div>`;
  } else {
    upcoming.forEach((t, idx) => {
      const c = tripColor(idx);
      const du = daysUntil(t.startDate);
      const badge = du > 0
        ? `<span class="badge badge-blue">${du}d away</span>`
        : du === 0 ? `<span class="badge badge-orange">Today!</span>`
        : `<span class="badge badge-green">In progress</span>`;
      tripsHtml += `
        <div class="trip-card fade-in" data-action="open-trip" data-id="${t.id}"
          style="--tc-main:${c.main};--tc-bg:${c.bg}">
          <div class="trip-card-suitcase">🧳</div>
          <div class="trip-card-content">
            <div class="trip-card-name">${t.name}</div>
            <div class="trip-card-dest">${t.destination}</div>
            <div class="trip-card-row">
              <span class="trip-card-dates">✈ ${formatDateShort(t.startDate)} – ${formatDateShort(t.endDate)}</span>
              ${badge}
              <span class="badge badge-gray">${t.days.length} days</span>
              ${t.ship ? `<span class="badge badge-gray">${t.ship}</span>` : ''}
              <button class="trip-card-edit-btn" data-action="edit-trip-card" data-id="${t.id}">${icons.edit} Edit</button>
            </div>
          </div>
        </div>`;
    });
  }

  return `
    <div class="home-hero">
      <div class="home-hero-inner">
        <div class="home-hero-text">
          <div class="home-hero-title">My Vacations</div>
          <div class="home-hero-sub">Warren Family Travel Planner</div>
        </div>
        <button class="btn-icon" style="background:rgba(255,255,255,0.18)" data-action="toggle-menu">${icons.menu}</button>
      </div>
    </div>
    <div class="scroll-content">
      ${countdownHtml}
      <div class="section-header">Upcoming Trips</div>
      ${tripsHtml}
      <div class="spacer"></div>
    </div>
    <div class="tab-bar">
      <button class="tab-item ${S.homeTab===0?'active':''}" data-action="home-tab" data-tab="0">
        ${icons.home}<span>Home</span>
      </button>
      <button class="tab-item ${S.homeTab===1?'active':''}" data-action="home-tab" data-tab="1">
        ${icons.archive}<span>Archive</span>
      </button>
    </div>`;
}

// ============================================================
// TRIP SCREEN
// ============================================================
function renderTrip() {
  const t = trip();
  if (!t) return '<div class="empty-state"><div class="empty-title">Trip not found</div></div>';
  const tabs = ['Itinerary','Clothes','Packing','Info'];
  const tabsHtml = tabs.map((tb,i) =>
    `<button class="trip-tab ${S.tripTab===i?'active':''}" data-action="trip-tab" data-tab="${i}">${tb}</button>`
  ).join('');
  let content = '';
  if (S.tripTab===0) content = renderItinerary(t);
  else if (S.tripTab===1) content = renderClothes(t);
  else if (S.tripTab===2) content = renderPacking(t);
  else if (S.tripTab===3) content = renderInfo(t);
  return `
    <div class="header">
      <div class="header-inner">
        <button class="btn-icon" data-action="back" style="flex-shrink:0">${icons.back}</button>
        <div class="header-title-group">
          <div class="header-title">${t.name}</div>
          <div class="header-subtitle">${formatDateShort(t.startDate)} – ${formatDateShort(t.endDate)}</div>
        </div>
        <button class="btn-icon" data-action="toggle-menu">${icons.menu}</button>
      </div>
      <div class="trip-tabs">${tabsHtml}</div>
    </div>
    <div class="scroll-content no-tab">${content}</div>`;
}

function renderItinerary(t) {
  let html = '';
  t.days.forEach(d => {
    const actCount = d.activities.length;
    const mealCount = [d.meals.breakfast,d.meals.lunch,d.meals.dinner].filter(m=>m.restaurant).length;
    html += `
      <div class="day-row" data-action="open-day" data-id="${d.id}">
        <div class="day-dot"></div>
        <div class="day-row-info">
          <div class="day-row-label">${d.dayLabel}</div>
          <div class="day-row-date">${formatDate(d.date)}</div>
          ${d.location ? `<div class="day-row-location">${icons.map} ${d.location}</div>` : ''}
          <div class="day-row-chips">
            ${actCount ? `<span class="badge badge-blue">${actCount} activit${actCount===1?'y':'ies'}</span>`:''}
            ${mealCount ? `<span class="badge badge-orange">${mealCount} meal${mealCount===1?'':'s'}</span>`:''}
          </div>
        </div>
        <span class="chevron">${icons.chevron}</span>
      </div>`;
  });
  if (!html) html = `<div class="empty-state"><div class="empty-icon">📅</div><div class="empty-title">No days yet</div></div>`;
  return html;
}

function renderClothes(t) {
  const travelers = t.travelers && t.travelers.length ? t.travelers : S.data.travelers;
  const personIdx = Math.min(S.clothesPerson, travelers.length - 1);
  const person = travelers[personIdx];
  const personTabsHtml = travelers.map((p,i) =>
    `<button class="person-tab ${personIdx===i?'active':''}" data-action="clothes-person" data-idx="${i}">${p}</button>`
  ).join('');
  const dayChipsHtml = t.days.map((d,i) =>
    `<div class="day-chip ${S.clothesDayIdx===i?'active':''}" data-action="clothes-day" data-idx="${i}">${d.dayLabel.split('—')[0].trim()}<br>${formatDateShort(d.date)}</div>`
  ).join('');
  const curDay = t.days[S.clothesDayIdx] || t.days[0];
  const outfitVal = curDay?.clothes?.[person] || '';
  let parsed = {}; try { parsed = JSON.parse(outfitVal); } catch(e) { parsed = { other: outfitVal }; }
  const fields = [
    {key:'top', label:'Top / Shirt'},
    {key:'bottom', label:'Bottom / Pants'},
    {key:'shoes', label:'Shoes'},
    {key:'accessories', label:'Accessories / Jewelry'},
    {key:'other', label:'Other / Notes'}
  ];
  const fieldsHtml = fields.map(f => `
    <div class="clothes-field">
      <div class="clothes-field-label">${f.label}</div>
      <textarea placeholder="What are you wearing?" data-action="clothes-input"
        data-person="${person}" data-day="${curDay?.id}" data-field="${f.key}">${parsed[f.key]||''}</textarea>
    </div>`).join('');
  return `
    <div class="person-tabs">${personTabsHtml}</div>
    <div class="clothes-day-picker-wrap">
      <div class="clothes-day-picker">${dayChipsHtml}</div>
    </div>
    <div style="padding-bottom:20px">
      ${curDay ? `<div class="section-header">${curDay.dayLabel}${curDay.location ? ' — '+curDay.location : ' — '+formatDateShort(curDay.date)}</div>` : ''}
      ${fieldsHtml}
      <div class="spacer"></div>
    </div>`;
}

function renderPacking(t) {
  const all = ['All', ...(t.travelers && t.travelers.length ? t.travelers : S.data.travelers)];
  const filterHtml = all.map(p =>
    `<button class="filter-chip ${S.packFilter===p?'active':''}" data-action="pack-filter" data-val="${p}">${p}</button>`
  ).join('');
  const items = t.packingList.filter(it => S.packFilter==='All' || it.person===S.packFilter || it.person==='All');
  const packed = items.filter(i=>i.packed).length;
  const pct = items.length ? Math.round(packed/items.length*100) : 0;
  const itemsHtml = items.map(it => `
    <div class="packing-item ${it.packed?'packed':''}" data-action="toggle-pack" data-id="${it.id}">
      <div class="packing-check ${it.packed?'checked':''}">${it.packed?icons.check:''}</div>
      <div class="packing-item-name">${it.item}</div>
      <div class="packing-item-person">${it.person!=='All'?it.person:''}</div>
      <button class="btn-icon dark" style="width:28px;height:28px;font-size:14px" data-action="delete-pack" data-id="${it.id}">✕</button>
    </div>`).join('');
  return `
    <div class="packing-progress">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <span style="font-size:14px;font-weight:700;color:var(--text)">Packing Progress</span>
        <span style="font-size:14px;font-weight:700;color:var(--primary)">${packed}/${items.length}</span>
      </div>
      <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="packing-filter">${filterHtml}</div>
    <div style="background:var(--card);border-radius:var(--radius);margin:0 16px;overflow:hidden;box-shadow:var(--shadow)">
      ${itemsHtml || '<div class="empty-state"><div class="empty-icon">✅</div><div class="empty-title">No items</div></div>'}
    </div>
    <div class="btn-row">
      <button class="btn btn-primary btn-full" data-action="add-pack-item">${icons.plus} Add Item</button>
      <button class="btn btn-outline" data-action="reset-pack">Reset</button>
    </div>
    <div class="spacer"></div>`;
}

// ============================================================
// EVENT HANDLER
// ============================================================
function attachEvents() {
  document.querySelectorAll('[data-action]').forEach(el => {
    el.addEventListener('click', handleAction, { passive: true });
  });
  document.querySelectorAll('[data-action="clothes-input"]').forEach(el => {
    el.addEventListener('input', handleClothesInput);
  });
}

function handleClothesInput(e) {
  const el = e.target;
  const person = el.dataset.person; const dayId = el.dataset.day; const field = el.dataset.field;
  const t = trip(); if (!t) return;
  const d = t.days.find(d => d.id===dayId); if (!d) return;
  if (!d.clothes[person]) d.clothes[person] = '{}';
  let parsed = {}; try { parsed = JSON.parse(d.clothes[person]); } catch(e) { parsed = { other: d.clothes[person] }; }
  parsed[field] = el.value;
  d.clothes[person] = JSON.stringify(parsed);
  save();
}

function handleAction(e) {
  const el = e.currentTarget; const action = el.dataset.action;
  switch(action) {
    case 'back': back(); break;
    case 'toggle-menu': S.menuOpen = !S.menuOpen; render(); break;
    case 'close-menu': S.menuOpen = false; render(); break;
    case 'menu-dashboard': S.menuOpen = false; S.screen = 'home'; S.stack = []; render(); break;
    case 'menu-edit': S.menuOpen = false; navigate('edit-trip'); break;
    case 'menu-save': save(); S.menuOpen = false; render(); toast('✓ Saved'); break;
    case 'menu-new-trip': S.menuOpen = false; navigate('new-trip'); break;
    case 'menu-export': S.menuOpen = false; render(); exportData(); break;
    case 'menu-import': S.menuOpen = false; render(); importData(); break;
    case 'home-tab': {
      const tab = parseInt(el.dataset.tab);
      S.menuOpen = false;
      if (tab===0) { S.homeTab=0; S.screen='home'; S.stack=[]; render(); }
      else { S.homeTab=1; S.screen='archive'; S.stack=[]; render(); }
      break;
    }
    case 'edit-trip-card': e.stopPropagation(); S.tripId=el.dataset.id; navigate('edit-trip'); break;
    case 'open-trip': e.stopPropagation(); S.tripId=el.dataset.id; navigate('trip', {tripTab:0}); break;
    case 'edit-trip': navigate('edit-trip'); break;
    case 'trip-tab': S.tripTab=parseInt(el.dataset.tab); render(); break;
    case 'open-day': S.dayId=el.dataset.id; navigate('day'); break;
    case 'edit-day': openModal('day'); break;
    case 'edit-meal': openModal('meal', {meal:el.dataset.meal}); break;
    case 'add-activity': openModal('activity', {actId:null}); break;
    case 'edit-activity': e.stopPropagation(); openModal('activity', {actId:el.dataset.id}); break;
    case 'delete-activity': {
      e.stopPropagation(); const d=day(); if (!d) break;
      d.activities=d.activities.filter(a=>a.id!==el.dataset.id); save(); render(); break;
    }
    case 'goto-clothes': {
      const t=trip(); if (!t) break;
      const dayIdx=t.days.findIndex(d=>d.id===S.dayId);
      navigate('trip', {tripTab:1, clothesDayIdx:Math.max(0,dayIdx)}); break;
    }
    case 'clothes-person': S.clothesPerson=parseInt(el.dataset.idx); render(); break;
    case 'clothes-day': S.clothesDayIdx=parseInt(el.dataset.idx); render(); break;
    case 'pack-filter': S.packFilter=el.dataset.val; render(); break;
    case 'toggle-pack': {
      const t=trip(); if (!t) break;
      const it=t.packingList.find(p=>p.id===el.dataset.id);
      if (it) { it.packed=!it.packed; save(); render(); } break;
    }
    case 'delete-pack': {
      e.stopPropagation(); const t=trip(); if (!t) break;
      t.packingList=t.packingList.filter(p=>p.id!==el.dataset.id); save(); render(); break;
    }
    case 'reset-pack': {
      const t=trip(); if (!t) break;
      t.packingList.forEach(p=>p.packed=false); save(); render(); toast('Packing list reset'); break;
    }
    case 'add-pack-item': openModal('pack-item'); break;
    case 'add-archive': openModal('archive-item', {item:{}}); break;
    case 'edit-archive': {
      const item=S.data.archive.find(a=>a.id===el.dataset.id);
      openModal('archive-item', {item:item||{}}); break;
    }
    case 'delete-archive': {
      e.stopPropagation(); S.data.archive=S.data.archive.filter(a=>a.id!==el.dataset.id);
      save(); render(); toast('Removed'); break;
    }
    case 'archive-trip': {
      const t=trip(); if (!t) break;
      t.status='archived'; save(); S.screen='home'; S.stack=[]; render(); toast('Trip archived'); break;
    }
    case 'toggle-booked': document.getElementById('m-booked')?.classList.toggle('on'); break;
    case 'close-modal': closeModal(); break;
    case 'save-trip': saveTripForm(); break;
    case 'save-meal': saveMeal(); break;
    case 'save-activity': saveActivity(); break;
    case 'save-day': saveDay(); break;
    case 'save-pack-item': savePackItem(); break;
    case 'save-archive-item': saveArchiveItem(); break;
  }
}

// ============================================================
// SAVE FUNCTIONS
// ============================================================
function readFlightTime(id) {
  const raw = document.getElementById(id)?.value || '';
  if (!raw) return '';
  const [hh, mm] = raw.split(':');
  const h = parseInt(hh); const ampm = h >= 12 ? 'PM' : 'AM';
  return `${h===0?12:h>12?h-12:h}:${mm} ${ampm}`;
}

function saveTripForm() {
  const name = document.getElementById('ft-name')?.value.trim();
  const dest = document.getElementById('ft-dest')?.value.trim();
  const start = document.getElementById('ft-start')?.value;
  const end = document.getElementById('ft-end')?.value;
  if (!name||!start||!end) { toast('Please fill in name and dates'); return; }
  if (end<start) { toast('End date must be after start date'); return; }
  const departFlight = {
    date: document.getElementById('ft-d-date')?.value || '',
    time: readFlightTime('ft-d-time'),
    airline: document.getElementById('ft-d-airline')?.value.trim() || '',
    flightNumber: document.getElementById('ft-d-fnum')?.value.trim() || ''
  };
  const returnFlight = {
    date: document.getElementById('ft-r-date')?.value || '',
    time: readFlightTime('ft-r-time'),
    airline: document.getElementById('ft-r-airline')?.value.trim() || '',
    flightNumber: document.getElementById('ft-r-fnum')?.value.trim() || ''
  };
  const travelersRaw = document.getElementById('ft-travelers')?.value || '';
  const travelers = travelersRaw.split('\n').map(s => s.trim()).filter(Boolean);
  if (!travelers.length) travelers.push(...S.data.travelers);
  const editing = S.screen === 'edit-trip';
  if (editing) {
    const t = trip(); if (!t) return;
    const oldStart = t.startDate; const oldEnd = t.endDate;
    t.name=name; t.destination=dest; t.startDate=start; t.endDate=end;
    t.travelers=travelers;
    t.ship=document.getElementById('ft-ship')?.value.trim()||'';
    t.reservationNumber=document.getElementById('ft-resnum')?.value.trim()||'';
    t.reservationLink=document.getElementById('ft-reslink')?.value.trim()||'';
    t.deposit=parseFloat(document.getElementById('ft-deposit')?.value)||0;
    t.depositDate=document.getElementById('ft-depdate')?.value||'';
    t.finalPayment=parseFloat(document.getElementById('ft-final')?.value)||0;
    t.finalPaymentDue=document.getElementById('ft-finaldue')?.value||'';
    t.notes=document.getElementById('ft-notes')?.value.trim()||'';
    t.departFlight=departFlight; t.returnFlight=returnFlight;
    if (oldStart!==start||oldEnd!==end) {
      const newDays=genDays(start,end,travelers);
      newDays.forEach(nd=>{ const ex=t.days.find(d=>d.date===nd.date); if(ex) Object.assign(nd,ex,{date:nd.date,id:nd.id}); });
      t.days=newDays;
    }
    save(); back(); toast('Trip updated');
  } else {
    const days=genDays(start,end,travelers);
    const t = {
      id:'trip-'+genId(), name, destination:dest, startDate:start, endDate:end, status:'upcoming',
      travelers,
      ship:document.getElementById('ft-ship')?.value.trim()||'',
      reservationNumber:document.getElementById('ft-resnum')?.value.trim()||'',
      reservationLink:document.getElementById('ft-reslink')?.value.trim()||'',
      deposit:parseFloat(document.getElementById('ft-deposit')?.value)||0,
      depositDate:document.getElementById('ft-depdate')?.value||'',
      finalPayment:parseFloat(document.getElementById('ft-final')?.value)||0,
      finalPaymentDue:document.getElementById('ft-finaldue')?.value||'',
      notes:document.getElementById('ft-notes')?.value.trim()||'',
      departFlight, returnFlight, days,
      packingList:buildDefaultData().trips[0].packingList
        .filter(p => p.person==='All' || travelers.includes(p.person))
        .map(p=>({...p,id:genId(),packed:false}))
    };
    S.data.trips.push(t); save();
    S.screen='home'; S.stack=[]; render(); toast('Trip created! 🎉');
  }
}

function saveMeal() {
  const d=day(); const mealKey=S.modalData.meal; if (!d||!mealKey) return;
  d.meals[mealKey]={
    restaurant:document.getElementById('m-restaurant')?.value.trim()||'',
    reservationInfo:document.getElementById('m-resinfo')?.value.trim()||'',
    notes:document.getElementById('m-notes')?.value.trim()||'',
    booked:document.getElementById('m-booked')?.classList.contains('on')||false
  };
  save(); closeModal(); toast('Meal saved');
}

function saveActivity() {
  const d=day(); if (!d) return; const actId=S.modalData.actId;
  const data={
    name:document.getElementById('a-name')?.value.trim()||'',
    time:document.getElementById('a-time')?.value.trim()||'',
    location:document.getElementById('a-location')?.value.trim()||'',
    reservationInfo:document.getElementById('a-resinfo')?.value.trim()||'',
    bookedWith:document.getElementById('a-bookedwith')?.value.trim()||'',
    status:document.getElementById('a-status')?.value||'TBD',
    notes:document.getElementById('a-notes')?.value.trim()||''
  };
  if (!data.name) { toast('Please enter an activity name'); return; }
  if (actId) { const act=d.activities.find(a=>a.id===actId); if(act) Object.assign(act,data); }
  else d.activities.push({id:genId(),...data});
  save();
  const actModalEl = document.getElementById('modal-activity');
  if (actModalEl) actModalEl.classList.remove('open');
  S.modal = null; S.modalData = {};
  S.screen = 'day';
  render(); toast('Activity saved');
}

function saveDay() {
  const d=day(); if (!d) return;
  d.dayLabel=document.getElementById('dd-label')?.value.trim()||d.dayLabel;
  d.location=document.getElementById('dd-location')?.value.trim()||'';
  d.notes=document.getElementById('dd-notes')?.value.trim()||'';
  save(); closeModal(); toast('Day updated');
}

function savePackItem() {
  const t=trip(); if (!t) return;
  const item=document.getElementById('pk-item')?.value.trim();
  const person=document.getElementById('pk-person')?.value||'All';
  if (!item) { toast('Please enter an item'); return; }
  t.packingList.push({id:genId(),item,person,packed:false});
  save(); closeModal(); toast('Item added');
}

function saveArchiveItem() {
  const year=parseInt(document.getElementById('ar-year')?.value);
  const dest=document.getElementById('ar-dest')?.value.trim();
  const notes=document.getElementById('ar-notes')?.value.trim();
  if (!year||!dest) { toast('Please enter year and destination'); return; }
  const editId=S.modalData.item?.id;
  if (editId) {
    const item=S.data.archive.find(a=>a.id===editId);
    if(item){item.year=year;item.destination=dest;item.notes=notes;}
  } else {
    S.data.archive.push({id:genId(),year,destination:dest,notes:notes||''});
  }
  save(); closeModal(); toast('Archive updated');
}

// ============================================================
// EXPORT / IMPORT
// ============================================================
function exportData() {
  const json = JSON.stringify(S.data, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'vacations-backup.json';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
  toast('Data exported! ✓');
}

function importData() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.json,application/json'; input.style.display = 'none';
  document.body.appendChild(input);
  input.onchange = function(e) {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
      try {
        const data = JSON.parse(ev.target.result);
        if (data.trips && data.travelers) {
          S.data = data; save(); S.screen = 'home'; S.stack = []; render(); toast('Data imported! ✓');
        } else { toast('Invalid backup file'); }
      } catch(err) { toast('Could not read file'); }
    };
    reader.readAsText(file);
    document.body.removeChild(input);
  };
  input.click();
}

// ============================================================
// INIT
// ============================================================
S.data = load();
render();
</script>
